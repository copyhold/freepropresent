appId: com.propresent.app
productName: songpresent
copyright: Copyright © 2026

directories:
  output: dist

files:
  - out/**/*
  - package.json

extraResources:
  - from: data/
    to: default-data/
  - from: LICENSE
    to: LICENSE
  - from: README.md
    to: README.md

win:
  target:
    - target: nsis

nsis:
  oneClick: true
  perMachine: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  license: LICENSE
  artifactName: ${productName}-Setup-${version}-${arch}.exe
