name: Build Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and attach to (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload EXE to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { throw "No .exe found in dist/" }
          Write-Host "Uploading $($exe.FullName)"
          gh release upload ${{ inputs.tag }} $exe.FullName --clobber
